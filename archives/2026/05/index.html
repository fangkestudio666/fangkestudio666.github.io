document.addEventListener('DOMContentLoaded', function() {
  // Only run on homepage
  if (!document.querySelector('.posts-expand')) return;
  
  // Get today's date components
  var today = new Date();
  var year = today.getFullYear();
  var month = String(today.getMonth() + 1).padStart(2, '0');
  var day = String(today.getDate()).padStart(2, '0');
  var dateStr = year + '-' + month + '-' + day;
  var dateDisplay = month * 1 + '月' + day * 1 + '日';
  
  // Update ALL posts' date to today
  var allPostMetas = document.querySelectorAll('.posts-expand .post-meta time');
  allPostMetas.forEach(function(meta) {
    meta.textContent = dateDisplay;
    meta.setAttribute('datetime', dateStr + 'T08:00:00+08:00');
  });
});
